<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumin Test</title>
<style>
body { background:#03030A; color:#FFB347; font-family:serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:1rem; }
input { background:rgba(255,179,71,0.05); border:1px solid #FFB347; color:#FFB347; padding:0.8rem; font-size:1rem; outline:none; width:280px; }
button { background:transparent; border:1px solid #FFB347; color:#FFB347; padding:0.8rem 2rem; font-size:1rem; cursor:pointer; }
#msg { font-style:italic; color:#FFE5A0; }
</style>
</head>
<body>
<h1 style="font-weight:300;letter-spacing:0.3em;">LUMIN</h1>
<input type="text" id="name-input" placeholder="Enter your name..." />
<button onclick="document.getElementById('msg').textContent = 'Hello ' + document.getElementById('name-input').value + '!'">Activate</button>
<div id="msg"></div>
</body>
</html>
