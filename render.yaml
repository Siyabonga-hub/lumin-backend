services:
  - type: web
    name: lumin-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ELEVEN_API_KEY
        sync: false
      - key: ELEVEN_VOICE_ID
        sync: false
